# ci.yml — Continuous integration for meapy.
#
# Runs on every push/PR to main: lint, multi-version test matrix, Docker build
# smoke test, and a Docker-Scout vulnerability scan. Release publishing lives
# in release.yml so this file stays focused on PR-time validation.
#
# Modify when:
#   - Adding/removing supported Python versions
#   - Changing lint/type tooling
#   - Adjusting the smoke test command

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/meapy

  # ───────────────────────────────────────────────────────────────────────
  test:
    name: Tests — py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest with coverage
        shell: bash
        run: |
          pytest tests/ -v \
            --cov=meapy \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build image (no push)
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — import + version
        run: |
          docker run --rm --entrypoint python \
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }} \
            -c "import meapy; print(meapy.__version__)"

      - name: Image size
        run: docker images ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Docker Scout — CVE scan
        uses: docker/scout-action@aceeb83b88f2ae54376891227858dda7af647183 # v1.15.0
        continue-on-error: true
        with:
          command: cves
          image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          only-severities: critical,high
          exit-code: true
