# ci.yml — Continuous integration for meapy.
#
# Runs on every push/PR to main: lint, multi-version test matrix, Docker build
# smoke test, and a Docker-Scout vulnerability scan. Release publishing lives
# in release.yml so this file stays focused on PR-time validation.
#
# Modify when:
#   - Adding/removing supported Python versions
#   - Changing lint/type tooling
#   - Adjusting the smoke test command

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/meapy

  # ───────────────────────────────────────────────────────────────────────
  test:
    name: Tests — py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest with coverage
        shell: bash
        run: |
          pytest tests/ -v \
            --cov=meapy \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — import + version
        run: |
          docker run --rm --entrypoint python \
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }} \
            -c "import meapy; print(meapy.__version__)"

      - name: Image size
        run: docker images ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Docker Scout — CVE scan
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1.15.0
        continue-on-error: true
        with:
          command: cves
          image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          only-severities: critical,high
          exit-code: true
